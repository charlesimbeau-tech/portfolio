<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>3D Gas Pump Viewer</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #0b1220; font-family: Inter, system-ui, sans-serif; }
    canvas { display: block; }
    .hud {
      position: fixed; left: 10px; top: 10px; right: 10px;
      color: #fff; background: rgba(0,0,0,.35); border: 1px solid rgba(255,255,255,.2);
      border-radius: 12px; padding: 8px 10px; font-size: 13px; backdrop-filter: blur(3px);
      z-index: 5;
    }
    .row { display: flex; justify-content: space-between; gap: 8px; }
    .muted { opacity: .85; }
  </style>
</head>
<body>
  <div class="hud">
    <div class="row"><strong>3D Gas Pump (Mobile)</strong><span id="status" class="muted">Ready</span></div>
    <div class="muted">Touch: drag to rotate • pinch to zoom • two-finger drag to pan</div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.161.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.161.0/examples/jsm/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f172a);

    const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 200);
    camera.position.set(2.8, 2.2, 3.6);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.07;
    controls.target.set(0, 1.0, 0);
    controls.minDistance = 1.8;
    controls.maxDistance = 9;

    // Lights
    scene.add(new THREE.HemisphereLight(0x9ec5ff, 0x1b2233, 0.8));
    const key = new THREE.DirectionalLight(0xffffff, 1.1);
    key.position.set(4, 7, 5);
    key.castShadow = true;
    scene.add(key);

    const fill = new THREE.DirectionalLight(0x8ab4ff, 0.45);
    fill.position.set(-4, 3, -4);
    scene.add(fill);

    // Floor
    const floor = new THREE.Mesh(
      new THREE.CylinderGeometry(4.2, 4.2, 0.05, 64),
      new THREE.MeshStandardMaterial({ color: 0x1f2937, roughness: 0.95, metalness: 0.05 })
    );
    floor.receiveShadow = true;
    scene.add(floor);

    // Gas pump model group
    const pump = new THREE.Group();

    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xe5e7eb, roughness: 0.6, metalness: 0.25 });
    const accentMat = new THREE.MeshStandardMaterial({ color: 0xdc2626, roughness: 0.5, metalness: 0.2 });
    const darkMat = new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 0.45, metalness: 0.3 });
    const glassMat = new THREE.MeshStandardMaterial({ color: 0x93c5fd, roughness: 0.08, metalness: 0.15, transparent: true, opacity: 0.45 });

    // Main body
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.15, 2.2, 0.8), bodyMat);
    body.position.y = 1.1;
    body.castShadow = true;
    pump.add(body);

    // Red top cap
    const cap = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.24, 0.84), accentMat);
    cap.position.set(0, 2.23, 0);
    cap.castShadow = true;
    pump.add(cap);

    // Display screen
    const screenFrame = new THREE.Mesh(new THREE.BoxGeometry(0.68, 0.42, 0.04), darkMat);
    screenFrame.position.set(0, 1.7, 0.42);
    pump.add(screenFrame);

    const screen = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.32, 0.02), glassMat);
    screen.position.set(0, 1.7, 0.45);
    pump.add(screen);

    // Buttons panel
    const panel = new THREE.Mesh(new THREE.BoxGeometry(0.58, 0.36, 0.03), new THREE.MeshStandardMaterial({ color: 0x374151, roughness: 0.8 }));
    panel.position.set(0, 1.2, 0.42);
    pump.add(panel);

    const btnMat = new THREE.MeshStandardMaterial({ color: 0x9ca3af, roughness: 0.6 });
    for (let r = 0; r < 2; r++) {
      for (let c = 0; c < 3; c++) {
        const b = new THREE.Mesh(new THREE.BoxGeometry(0.11, 0.07, 0.03), btnMat);
        b.position.set(-0.16 + c * 0.16, 1.25 - r * 0.1, 0.45);
        pump.add(b);
      }
    }

    // Lower door
    const door = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.6, 0.03), new THREE.MeshStandardMaterial({ color: 0xd1d5db, roughness: 0.8 }));
    door.position.set(0, 0.52, 0.42);
    pump.add(door);

    // Hose column and hose
    const hoseMount = new THREE.Mesh(new THREE.BoxGeometry(0.18, 1.15, 0.12), darkMat);
    hoseMount.position.set(0.53, 1.15, 0.33);
    pump.add(hoseMount);

    const hosePoints = [
      new THREE.Vector3(0.53, 1.7, 0.35),
      new THREE.Vector3(1.0, 1.5, 0.45),
      new THREE.Vector3(1.05, 0.95, 0.25),
      new THREE.Vector3(0.78, 0.7, 0.35),
    ];
    const hoseCurve = new THREE.CatmullRomCurve3(hosePoints);
    const hose = new THREE.Mesh(
      new THREE.TubeGeometry(hoseCurve, 32, 0.03, 10, false),
      new THREE.MeshStandardMaterial({ color: 0x0b0f14, roughness: 0.9 })
    );
    hose.castShadow = true;
    pump.add(hose);

    // Nozzle
    const nozzle = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.08, 0.08), darkMat);
    nozzle.position.set(0.74, 0.66, 0.36);
    nozzle.rotation.y = 0.45;
    pump.add(nozzle);

    // Brand stripe
    const stripe = new THREE.Mesh(new THREE.BoxGeometry(1.16, 0.14, 0.82), new THREE.MeshStandardMaterial({ color: 0x2563eb }));
    stripe.position.set(0, 2.03, 0);
    pump.add(stripe);

    pump.position.y = 0.02;
    scene.add(pump);

    const status = document.getElementById('status');
    let t = 0;

    function animate() {
      requestAnimationFrame(animate);
      t += 0.01;
      // subtle idle float
      pump.position.y = 0.02 + Math.sin(t) * 0.01;
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    status.textContent = 'Interactive';
  </script>
</body>
</html>
