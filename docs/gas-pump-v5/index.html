<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>3D Gas Pump (Mobile Safe)</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#0b1530;font-family:Inter,system-ui,sans-serif;color:#fff}
    .hud{position:fixed;left:10px;right:10px;top:10px;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:8px 10px;z-index:20}
    .row{display:flex;justify-content:space-between}.muted{opacity:.85}
    .stage{position:absolute;inset:0;display:grid;place-items:center;perspective:1100px}
    .world{width:260px;height:360px;transform-style:preserve-3d;transform:rotateX(-8deg) rotateY(-26deg);transition:transform .05s linear}
    .pump{position:absolute;left:50%;top:50%;width:120px;height:220px;transform-style:preserve-3d;transform:translate(-50%,-50%) translateZ(0)}
    .face{position:absolute;inset:0;background:#e5e7eb;border:2px solid #d1d5db}
    .front{transform:translateZ(40px)}
    .back{transform:rotateY(180deg) translateZ(40px)}
    .left{width:80px;left:-40px;transform:rotateY(-90deg) translateZ(40px);background:#d8dde6}
    .right{width:80px;right:-40px;left:auto;transform:rotateY(90deg) translateZ(40px);background:#d8dde6}
    .top{height:80px;top:-40px;transform:rotateX(90deg) translateZ(40px);background:#ef4444}
    .bottom{height:80px;bottom:-40px;top:auto;transform:rotateX(-90deg) translateZ(180px);background:#9ca3af}
    .screen{position:absolute;left:50%;top:28px;width:74px;height:40px;transform:translateX(-50%);background:#8ec5ff;border:2px solid #111827;border-radius:4px}
    .panel{position:absolute;left:50%;top:82px;width:78px;height:56px;transform:translateX(-50%);background:#374151;border-radius:4px}
    .btn{position:absolute;width:16px;height:10px;background:#9ca3af;border-radius:2px}
    .door{position:absolute;left:50%;top:148px;width:84px;height:58px;transform:translateX(-50%);background:#d1d5db;border-radius:3px}
    .stripe{position:absolute;left:0;right:0;top:12px;height:12px;background:#2563eb}
    .hose{position:absolute;right:-22px;top:78px;width:20px;height:96px;border:6px solid #111827;border-left:none;border-radius:0 18px 18px 0}
    .nozzle{position:absolute;right:-12px;top:164px;width:24px;height:8px;background:#111827;border-radius:2px;transform:rotate(24deg)}
    .ground{position:absolute;width:340px;height:340px;background:radial-gradient(circle,#2a354f 0,#1d263f 45%,#121a2f 75%);border-radius:50%;transform:rotateX(90deg) translateZ(-120px)}
  </style>
</head>
<body>
  <div class="hud">
    <div class="row"><strong>3D Gas Pump (Mobile)</strong><span id="status" class="muted">Interactive</span></div>
    <div class="muted">Touch drag to rotate • pinch to zoom</div>
  </div>
  <div class="stage" id="stage">
    <div class="world" id="world">
      <div class="ground"></div>
      <div class="pump" id="pump">
        <div class="face front"><div class="stripe"></div><div class="screen"></div><div class="panel" id="panel"></div><div class="door"></div><div class="hose"></div><div class="nozzle"></div></div>
        <div class="face back"></div>
        <div class="face left"></div>
        <div class="face right"></div>
        <div class="face top"></div>
        <div class="face bottom"></div>
      </div>
    </div>
  </div>
  <script>
    const panel = document.getElementById('panel');
    for(let r=0;r<2;r++){for(let c=0;c<3;c++){const b=document.createElement('div');b.className='btn';b.style.left=(10+c*22)+'px';b.style.top=(10+r*20)+'px';panel.appendChild(b);}}

    const world=document.getElementById('world');
    let rx=-8, ry=-26, scale=1;
    let touching=false, lx=0, ly=0, startDist=0, startScale=1;
    const apply=()=>{world.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg) scale(${scale})`;};
    apply();

    function dist(t1,t2){const dx=t1.clientX-t2.clientX, dy=t1.clientY-t2.clientY; return Math.hypot(dx,dy);}

    window.addEventListener('touchstart',e=>{
      if(e.touches.length===1){touching=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}
      if(e.touches.length===2){startDist=dist(e.touches[0],e.touches[1]);startScale=scale;}
    },{passive:true});

    window.addEventListener('touchmove',e=>{
      if(e.touches.length===1 && touching){const x=e.touches[0].clientX,y=e.touches[0].clientY; ry += (x-lx)*0.35; rx -= (y-ly)*0.25; rx=Math.max(-45,Math.min(35,rx)); lx=x;ly=y;apply();}
      if(e.touches.length===2){const d=dist(e.touches[0],e.touches[1]); scale = Math.max(0.7,Math.min(1.8,startScale*(d/startDist))); apply();}
    },{passive:true});

    window.addEventListener('touchend',()=>{touching=false;},{passive:true});
  </script>
</body>
</html>
