<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>3D Gas Pump Viewer</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #0f172a; font-family: Inter, system-ui, sans-serif; }
    #app { width: 100%; height: 100%; }
    .hud {
      position: fixed; left: 10px; top: 10px; right: 10px;
      color: #fff; background: rgba(0,0,0,.38); border: 1px solid rgba(255,255,255,.2);
      border-radius: 12px; padding: 8px 10px; font-size: 13px; z-index: 5;
    }
    .row { display: flex; justify-content: space-between; gap: 8px; }
    .muted { opacity: .85; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="hud">
    <div class="row"><strong>3D Gas Pump (Mobile)</strong><span id="status" class="muted">Loading…</span></div>
    <div class="muted">Touch: drag rotate • pinch zoom • two-finger drag pan</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.161.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    (function () {
      const status = document.getElementById('status');
      try {
        const app = document.getElementById('app');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f172a);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 300);
        camera.position.set(2.8, 2.2, 3.8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        app.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.target.set(0, 1.0, 0);
        controls.minDistance = 1.6;
        controls.maxDistance = 8;

        scene.add(new THREE.HemisphereLight(0x9ec5ff, 0x20283a, 0.95));
        const key = new THREE.DirectionalLight(0xffffff, 1.0);
        key.position.set(5, 7, 4);
        key.castShadow = true;
        scene.add(key);

        const floor = new THREE.Mesh(
          new THREE.CylinderGeometry(4.5, 4.5, 0.08, 64),
          new THREE.MeshStandardMaterial({ color: 0x1f2937, roughness: 0.95 })
        );
        floor.receiveShadow = true;
        scene.add(floor);

        const pump = new THREE.Group();
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xe5e7eb, roughness: 0.6, metalness: 0.2 });
        const accentMat = new THREE.MeshStandardMaterial({ color: 0xdc2626, roughness: 0.45 });
        const darkMat = new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 0.5 });
        const glassMat = new THREE.MeshStandardMaterial({ color: 0x93c5fd, roughness: 0.05, transparent: true, opacity: 0.5 });

        const body = new THREE.Mesh(new THREE.BoxGeometry(1.15, 2.2, 0.82), bodyMat);
        body.position.y = 1.1;
        pump.add(body);

        const cap = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.22, 0.86), accentMat);
        cap.position.set(0, 2.22, 0);
        pump.add(cap);

        const screenFrame = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.46, 0.05), darkMat);
        screenFrame.position.set(0, 1.72, 0.43);
        pump.add(screenFrame);

        const screen = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.34, 0.02), glassMat);
        screen.position.set(0, 1.72, 0.46);
        pump.add(screen);

        const panel = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.36, 0.03), new THREE.MeshStandardMaterial({ color: 0x374151 }));
        panel.position.set(0, 1.2, 0.43);
        pump.add(panel);

        for (let r = 0; r < 2; r++) {
          for (let c = 0; c < 3; c++) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(0.11, 0.07, 0.03), new THREE.MeshStandardMaterial({ color: 0x9ca3af }));
            b.position.set(-0.16 + c * 0.16, 1.25 - r * 0.1, 0.46);
            pump.add(b);
          }
        }

        const door = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.62, 0.03), new THREE.MeshStandardMaterial({ color: 0xd1d5db }));
        door.position.set(0, 0.52, 0.43);
        pump.add(door);

        const hoseMount = new THREE.Mesh(new THREE.BoxGeometry(0.18, 1.12, 0.12), darkMat);
        hoseMount.position.set(0.53, 1.12, 0.33);
        pump.add(hoseMount);

        const points = [
          new THREE.Vector3(0.53, 1.68, 0.35),
          new THREE.Vector3(0.98, 1.5, 0.42),
          new THREE.Vector3(1.05, 0.95, 0.25),
          new THREE.Vector3(0.79, 0.72, 0.35)
        ];
        const curve = new THREE.CatmullRomCurve3(points);
        const hose = new THREE.Mesh(
          new THREE.TubeGeometry(curve, 32, 0.03, 8, false),
          new THREE.MeshStandardMaterial({ color: 0x0b0f14, roughness: 0.9 })
        );
        pump.add(hose);

        const nozzle = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.08, 0.08), darkMat);
        nozzle.position.set(0.74, 0.68, 0.36);
        nozzle.rotation.y = 0.45;
        pump.add(nozzle);

        const stripe = new THREE.Mesh(new THREE.BoxGeometry(1.16, 0.14, 0.84), new THREE.MeshStandardMaterial({ color: 0x2563eb }));
        stripe.position.set(0, 2.03, 0);
        pump.add(stripe);

        pump.traverse(o => { if (o.isMesh) o.castShadow = true; });
        pump.position.y = 0.04;
        scene.add(pump);

        function animate() {
          requestAnimationFrame(animate);
          controls.update();
          renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });

        status.textContent = 'Interactive';
      } catch (e) {
        status.textContent = 'Render error';
        console.error(e);
      }
    })();
  </script>
</body>
</html>
